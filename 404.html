<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5xLiving VR Workstation</title>
    <meta
      name="description"
      content="Public shell for 5xLiving VR Workstation. The requested page is not available on the public site."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111a;
        --panel: rgba(10, 18, 31, 0.82);
        --border: rgba(145, 184, 255, 0.18);
        --text: #f4f7fb;
        --muted: #adc0d5;
        --accent: #8df0d1;
        font-family: "Aptos", "Trebuchet MS", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(103, 168, 255, 0.24), transparent 26%),
          radial-gradient(circle at 82% 18%, rgba(141, 240, 209, 0.18), transparent 20%),
          linear-gradient(180deg, #08111b 0%, var(--bg) 55%, #050a10 100%);
        padding: 24px;
      }

      .shell {
        width: min(760px, 100%);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
        padding: 32px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.2rem, 7vw, 4rem);
      }

      p {
        margin: 0;
        line-height: 1.65;
        color: var(--muted);
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 24px;
        padding: 0 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent) 0%, #d4fff0 100%);
        color: #07201a;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">5xLiving VR Workstation</p>
      <h1>Page Not Available</h1>
      <p>The public site currently serves the 5xLiving VR Workstation landing shell and project overview only.</p>
      <a href="/">Return to Home</a>
    </main>
  </body>
</html>
